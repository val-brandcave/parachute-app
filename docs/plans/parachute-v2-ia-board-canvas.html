<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Parachute v2 — IA Board (canvas)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Schibsted+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#10344C; --navy-h:#1B4F73; --petrol:#2A6F7F; --petrol-tint:#DEEBEE;
    --canvas:#ECEEF1; --surface:#FFFFFF; --surface-1:#F1F2F4; --surface-2:#E9EBEE;
    --border:#E2E4E8; --hair:#EDEEF1;
    --ink:#1A1D21; --ink-2:#565C64; --ink-3:#868D96;
    --built:#15834A; --locked:#2A6F7F; --undecided:#C98A12; --temp:#868D96;
    --line:#C7CCD2;
    --r:12px;
    font-family:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--canvas);color:var(--ink);font-size:13px;line-height:1.5}

  /* ---- canvas viewport + world ---- */
  #viewport{position:fixed;inset:0;overflow:hidden;cursor:grab;touch-action:none;
    background:
      radial-gradient(circle at 1px 1px, #d4d8dd 1px, transparent 0) 0 0/26px 26px,
      var(--canvas);}
  #viewport.grabbing{cursor:grabbing}
  #world{position:absolute;top:0;left:0;transform-origin:0 0;user-select:none;will-change:transform}

  /* ---- area container ---- */
  .area{position:absolute;background:rgba(241,242,244,.78);border:1px solid var(--border);border-radius:18px;padding:38px 26px 28px;width:max-content}
  .area.flat{padding-bottom:26px}
  .area.tint-petrol{background:rgba(222,235,238,.7)}
  .area > .area-label{position:absolute;top:-14px;left:20px;background:var(--navy);color:#fff;font-weight:600;font-size:13px;letter-spacing:.3px;padding:6px 15px;border-radius:10px;box-shadow:0 2px 5px rgba(16,52,76,.2)}
  .area-note{font-size:11.5px;color:var(--ink-2);margin:-4px 0 16px;max-width:760px}

  /* ---- card ---- */
  .node{position:relative;z-index:1;display:inline-block;width:248px;vertical-align:top;text-align:left}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 1px 2px rgba(16,52,76,.06),0 3px 10px rgba(16,52,76,.06);padding:26px 14px 14px;position:relative;min-height:118px;cursor:zoom-in;transition:box-shadow .12s,border-color .12s}
  .card:hover{box-shadow:0 4px 16px rgba(16,52,76,.16);border-color:#cfd4da}
  .pill{position:absolute;top:-11px;left:12px;color:#fff;font-weight:600;font-size:11.5px;padding:4px 11px;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.12);max-width:218px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pill.built{background:var(--built)} .pill.locked{background:var(--locked)}
  .pill.undecided{background:var(--undecided)} .pill.temp{background:var(--temp)}
  .card .body{display:flex;gap:11px}
  .thumb{flex:0 0 64px;height:64px;background:repeating-linear-gradient(135deg,#dfe3e8 0 6px,#e7eaee 6px 12px);border:1px solid var(--border);border-radius:7px;display:grid;place-items:center;text-align:center;font-size:8.5px;color:var(--ink-3);padding:4px;line-height:1.2}
  .card .desc{flex:1;font-size:11.5px;color:var(--ink-2);line-height:1.45}
  .card .route{display:block;color:var(--petrol);font-weight:600;font-size:10.5px;margin-bottom:3px}
  .card .openq{display:block;margin-top:6px;color:var(--undecided);font-size:10.5px;font-weight:600}
  .kindtag{position:absolute;top:8px;right:10px;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--ink-3)}

  /* ---- tree layout (connectors are drawn as SVG by drawTreeConnectors,
     computed from real card positions so they always touch the cards) ---- */
  .tree{display:inline-block;position:relative;padding-top:4px}
  .tree ul{display:flex;justify-content:center;padding-top:36px;position:relative}
  .tree li{list-style:none;position:relative;padding:0 16px;text-align:center}
  .tree > ul{padding-top:0}
  .conn-svg{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;z-index:0}

  .flatrow{display:flex;flex-wrap:wrap;gap:18px}
  .subview .pill::before{content:'▸ ';opacity:.8}
  .tabnode .pill::before{content:'⊞ ';opacity:.85}

  /* ---- floating chrome ---- */
  .toolbar{position:fixed;top:14px;left:14px;z-index:30;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);border:1px solid var(--border);border-radius:14px;padding:10px 14px;box-shadow:0 4px 16px rgba(16,52,76,.12);max-width:min(680px,calc(100vw - 28px))}
  .toolbar .ttl{font-family:'Schibsted Grotesk','Inter',sans-serif;font-weight:700;color:var(--navy);font-size:15px;white-space:nowrap}
  .toolbar .legend{display:flex;flex-wrap:wrap;gap:9px;align-items:center;border-left:1px solid var(--border);padding-left:12px}
  .toolbar .lg{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-2)}
  .toolbar .dot{width:10px;height:10px;border-radius:3px}
  .zoombar{position:fixed;top:14px;right:14px;z-index:30;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);border:1px solid var(--border);border-radius:14px;padding:7px 9px;box-shadow:0 4px 16px rgba(16,52,76,.12)}
  .zoombar button{font-family:inherit;border:1px solid var(--border);background:var(--surface);color:var(--navy);border-radius:9px;height:34px;min-width:34px;padding:0 11px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
  .zoombar button:hover{background:var(--surface-1);border-color:#cfd4da}
  .zoombar .zlevel{min-width:50px;text-align:center;font-size:12px;color:var(--ink-2);font-variant-numeric:tabular-nums}
  .hint{position:fixed;bottom:14px;left:14px;z-index:30;background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:10px;padding:7px 12px;font-size:11.5px;color:var(--ink-2);box-shadow:0 2px 8px rgba(16,52,76,.1)}
  .hint b{color:var(--navy)}

  /* ---- minimap ---- */
  #minimap{position:fixed;bottom:14px;right:14px;z-index:30;width:230px;height:158px;background:rgba(255,255,255,.94);border:1px solid var(--border);border-radius:12px;box-shadow:0 4px 16px rgba(16,52,76,.14);overflow:hidden;cursor:pointer}
  #minimap .mm-inner{position:absolute;inset:0}
  #minimap .mm-area{position:absolute;border-radius:3px}
  #minimap .mm-view{position:absolute;border:2px solid var(--navy);background:rgba(16,52,76,.1);border-radius:3px;pointer-events:none}
  #minimap .mm-label{position:absolute;top:5px;left:8px;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--ink-3)}
</style>
</head>
<body>
  <div class="toolbar">
    <span class="ttl">Parachute v2 · IA</span>
    <span class="legend">
      <span class="lg"><span class="dot" style="background:var(--built)"></span>Built</span>
      <span class="lg"><span class="dot" style="background:var(--locked)"></span>Locked</span>
      <span class="lg"><span class="dot" style="background:var(--undecided)"></span>Undecided</span>
      <span class="lg"><span class="dot" style="background:var(--temp)"></span>Temp</span>
      <span class="lg">⊞ tab · ▸ sub-view</span>
    </span>
  </div>

  <div class="zoombar">
    <button id="z-out" title="Zoom out">−</button>
    <span class="zlevel" id="zlevel">100%</span>
    <button id="z-in" title="Zoom in">+</button>
    <button id="z-fit" title="Fit whole board">Fit</button>
    <button id="z-reset" title="Reset to 100%">Reset</button>
  </div>

  <div id="viewport">
    <div id="world"></div>
  </div>

  <div id="minimap"><div class="mm-inner" id="mm-inner"></div><span class="mm-label">Overview</span></div>
  <div class="hint">Scroll / pinch to <b>zoom</b> · drag to <b>pan</b> · click a <b>card</b> to focus · click empty space to <b>fit</b></div>

<script>
/* ============================================================
   IA DATA — kept in sync with parachute-v2-ia-board.html / ia-map.md.
   (Canvas variant: same data, zoomable 2D board.)
   ============================================================ */
const AREAS = [
  {
    label:'Authentication', kind:'tree',
    roots:[
      { name:'Login', status:'built', route:'/login',
        desc:'Sign in with email or single sign-on. The way into the app.',
        children:[
          { name:'Launch', status:'built', route:'/launch',
            desc:'A brief hand-off screen when you arrive from YouConnect, then takes you to the dashboard.' }
        ]}
    ]
  },
  {
    label:'Core app', kind:'tree',
    note:'The signed-in app — a sidebar to move between sections and a top bar with search, notifications, and your profile.',
    roots:[
      { name:'App shell', status:'built',
        desc:'The frame around every signed-in screen: navigation, top bar, quick search, and the order flow.',
        children:[
          { name:'Dashboard', status:'built', route:'/dashboard',
            desc:'<b>Function</b> — your overview of recent activity and what needs attention.<br><b>Actions</b> — jump into work, or start something new from YouConnect.' },

          { name:'Reviews', status:'built', route:'/reviews',
            desc:'<b>Function</b> — the team\'s queue of appraisal reviews.<br><b>Actions</b> — filter, search, open a review, or start a new one.',
            children:[
              { name:'Review detail', status:'locked', route:'/reviews/[id]', kind:'page',
                desc:'<b>Function</b> — a single review, with a technical and an administrative side.<br><b>Actions</b> — switch sides, work through it, then compile or return it.',
                children:[
                  { name:'Tab / Technical', status:'locked', kind:'tab',
                    desc:'Work through the review\'s findings and build the report.',
                    children:[
                      { name:'Findings', status:'locked', kind:'subview',
                        desc:'<b>Function</b> — review findings one at a time, with the source document alongside.<br><b>Actions</b> — accept, reject, or comment on each.' },
                      { name:'Builder', status:'locked', kind:'subview',
                        desc:'Adjust how the final report is laid out.' },
                      { name:'Workbook', status:'locked', kind:'subview',
                        desc:'<b>Function</b> — the finished, branded report.<br><b>Actions</b> — sign it off, or send it back to the appraiser.' }
                    ]},
                  { name:'Tab / Administrative', status:'locked', kind:'tab',
                    desc:'<b>Function</b> — the bank\'s compliance checklist.<br><b>Actions</b> — answer each item with evidence, then sign off.' },
                  { name:'Triage', status:'locked', route:'/reviews/[id]/triage', kind:'page',
                    desc:'<b>Function</b> — a review the system automatically rejected.<br><b>Actions</b> — let it through, or confirm the rejection.' }
                ]}
            ]},

          { name:'Templates', status:'built', route:'/templates',
            desc:'A tabbed library of reusable pieces — Compliance Checklists, Response Templates, and Workbook Layout. Checklists & layouts are versioned (published / draft / archived); each card shows the live version with a collapsible version history.',
            children:[
              { name:'Compliance Checklists', status:'built', route:'/templates/checklist/[id]',
                desc:'Versioned admin-review forms (AI-mapped from a .docx). One is the org default; others are alternates picked per order. Edit creates a draft → publish a new version. (Creating new checklists is deferred pending client input on the upload flow.)' },
              { name:'Response Templates', status:'built', route:'/templates/responses',
                desc:'Org + personal libraries of canned wording (merge fields) dropped into findings and reports. Not versioned — a live snippet library; scope is chosen by the card you open.' },
              { name:'Workbook Layout', status:'built', route:'/templates/workbook-layout',
                desc:'The org-default Technical workbook structure, one default per review profile (Commercial / Residential). New reviews inherit it; reviewers tweak per review in the Builder.' }
            ]},

          { name:'Settings', status:'built', route:'/settings',
            desc:'Manage the organization, review defaults, compliance, your profile, and preferences.' }
        ]}
    ]
  },
  {
    label:'Global overlays', kind:'flat', tint:true,
    roots:[
      { name:'Order stepper', status:'locked', kind:'overlay',
        desc:'<b>Function</b> — order a new review.<br><b>Actions</b> — choose a source, set it up, and start it.' },
      { name:'Command palette', status:'built', kind:'overlay',
        desc:'A keyboard shortcut to jump anywhere or run a quick action.' },
      { name:'Notifications panel', status:'locked', kind:'overlay',
        desc:'A panel of review updates that link straight to the review.' },
      { name:'Quick-look drawer', status:'locked', kind:'overlay',
        desc:'Peek at a review without leaving the queue.' },
      { name:'Download menu', status:'locked', kind:'overlay',
        desc:'Download a review as PDF, Word, or a ZIP.' },
      { name:'Source-preview modal', status:'locked', kind:'overlay',
        desc:'Preview an appraisal section before adding it to the report.' },
      { name:'Snackbar / toast', status:'built', kind:'overlay',
        desc:'Brief confirmation messages, with an undo.' }
    ]
  },
  {
    label:'Dev / temporary', kind:'flat',
    roots:[
      { name:'/components', status:'temp', kind:'page', desc:'Internal showcase of the building-block components.' },
      { name:'/styleguide', status:'temp', kind:'page', desc:'Internal color and style reference.' }
    ]
  }
];

/* ---------- card / tree renderers ---------- */
function card(n){
  const kind = n.kind || 'page';
  const kindLabel = kind==='tab' ? 'Tab' : kind==='subview' ? 'Sub-view' : kind==='overlay' ? 'Overlay' : '';
  const cls = kind==='subview' ? 'subview' : kind==='tab' ? 'tabnode' : '';
  return `<div class="node ${cls}">
    <div class="card">
      <span class="pill ${n.status}">${n.name}</span>
      ${kindLabel?`<span class="kindtag">${kindLabel}</span>`:''}
      <div class="body">
        <div class="thumb">${n.name}</div>
        <div class="desc">${n.route?`<span class="route">${n.route}</span>`:''}${n.desc}${n.openq?`<span class="openq">🟧 ${n.openq}</span>`:''}</div>
      </div>
    </div>
  </div>`;
}
function treeList(nodes){
  return `<ul>${nodes.map(n=>{
    const kids = n.children && n.children.length ? treeList(n.children) : '';
    return `<li>${card(n)}${kids}</li>`;
  }).join('')}</ul>`;
}
function areaHTML(a){
  const label = `<span class="area-label">${a.label}</span>`;
  const note = a.note?`<div class="area-note">${a.note}</div>`:'';
  const inner = a.kind==='tree'
    ? `<div class="tree">${treeList(a.roots)}</div>`
    : `<div class="flatrow">${a.roots.map(card).join('')}</div>`;
  return label+note+inner;
}

/* ---------- build areas + spatial layout ---------- */
const world = document.getElementById('world');
const areaEls = AREAS.map(a=>{
  const el = document.createElement('section');
  el.className = 'area '+(a.kind==='flat'?'flat ':'')+(a.tint?'tint-petrol':'');
  if(a.kind==='flat') el.style.width = '820px';   // wrap flat areas into ~3-up rows
  el.innerHTML = areaHTML(a);
  world.appendChild(el);
  return el;
});

let contentW=0, contentH=0;
function layout(){
  const m = areaEls.map(el=>({w:el.offsetWidth,h:el.offsetHeight}));
  const GAP=90;
  // left column: Authentication (0) over Core App (1); right column: Overlays (2) over Dev (3)
  const leftW = Math.max(m[0].w, m[1].w);
  // left column
  pos(0, 0, 0);
  pos(1, 0, m[0].h + GAP);
  const leftH = m[0].h + GAP + m[1].h;
  // right column
  const rightX = leftW + GAP*1.4;
  pos(2, rightX, 0);
  pos(3, rightX, m[2].h + GAP);
  const rightH = m[2].h + GAP + m[3].h;
  contentW = rightX + Math.max(m[2].w, m[3].w);
  contentH = Math.max(leftH, rightH);
  function pos(i,x,y){areaEls[i].style.left=x+'px';areaEls[i].style.top=y+'px';}
  buildMinimap(m);
}

/* ---------- pan / zoom ---------- */
const vp = document.getElementById('viewport');
const zlevel = document.getElementById('zlevel');
const MIN=0.05, MAX=2;
let scale=1, tx=0, ty=0;

function apply(animate){
  world.style.transition = animate ? 'transform .35s cubic-bezier(.4,0,.2,1)' : 'none';
  world.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  zlevel.textContent = Math.round(scale*100)+'%';
  updateMiniView();
}
const clampS = s => Math.max(MIN, Math.min(MAX, s));
function zoomAt(cx,cy,factor){
  const ns = clampS(scale*factor);
  const wx=(cx-tx)/scale, wy=(cy-ty)/scale;
  scale=ns; tx=cx-wx*scale; ty=cy-wy*scale; apply();
}
function fitView(animate=true){
  const r=vp.getBoundingClientRect(), pad=90;
  scale=clampS(Math.min((r.width-pad)/contentW,(r.height-pad)/contentH));
  tx=(r.width-contentW*scale)/2; ty=(r.height-contentH*scale)/2; apply(animate);
}
function resetView(){
  scale=1; const r=vp.getBoundingClientRect();
  tx=40; ty=Math.min(40,(r.height-contentH)/2); apply(true);
}
function zoomToEl(el){
  const r=el.getBoundingClientRect(), vr=vp.getBoundingClientRect(), pad=80;
  const wx=(r.left-vr.left-tx)/scale, wy=(r.top-vr.top-ty)/scale;
  const wW=r.width/scale, wH=r.height/scale;
  scale=clampS(Math.min((vr.width-pad)/wW,(vr.height-pad)/wH));
  tx=(vr.width-wW*scale)/2 - wx*scale;
  ty=(vr.height-wH*scale)/2 - wy*scale;
  apply(true);
}

vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=vp.getBoundingClientRect();
  zoomAt(e.clientX-r.left, e.clientY-r.top, Math.exp(-e.deltaY*0.0015));
},{passive:false});

let dragging=false, moved=false, sx=0, sy=0;
vp.addEventListener('pointerdown',e=>{dragging=true;moved=false;sx=e.clientX;sy=e.clientY;vp.classList.add('grabbing');});
window.addEventListener('pointermove',e=>{
  if(!dragging)return;
  const dx=e.clientX-sx, dy=e.clientY-sy;
  if(Math.abs(dx)+Math.abs(dy)>3) moved=true;
  tx+=dx; ty+=dy; sx=e.clientX; sy=e.clientY; apply();
});
window.addEventListener('pointerup',e=>{
  if(!dragging)return;
  dragging=false; vp.classList.remove('grabbing');
  if(moved) return;                               // it was a pan, not a click
  const t=document.elementFromPoint(e.clientX,e.clientY);
  const cardEl = t && t.closest && t.closest('.card');
  if(cardEl) zoomToEl(cardEl);
  else if(t && (t.id==='viewport' || t.id==='world' || (t.classList&&t.classList.contains('area')))) fitView();
});

document.getElementById('z-in').onclick = ()=>{const r=vp.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1.25);};
document.getElementById('z-out').onclick = ()=>{const r=vp.getBoundingClientRect();zoomAt(r.width/2,r.height/2,0.8);};
document.getElementById('z-fit').onclick = ()=>fitView();
document.getElementById('z-reset').onclick = ()=>resetView();
window.addEventListener('keydown',e=>{
  if(e.key==='+'||e.key==='='){document.getElementById('z-in').click();}
  else if(e.key==='-'){document.getElementById('z-out').click();}
  else if(e.key==='0'){fitView();}
});

/* ---------- minimap ---------- */
const mmInner = document.getElementById('mm-inner');
const minimap = document.getElementById('minimap');
let mmScale=1, mmOffX=0, mmOffY=0, mmView;
const AREA_FILL=['rgba(16,52,76,.18)','rgba(16,52,76,.22)','rgba(42,111,127,.22)','rgba(134,141,150,.22)'];
function buildMinimap(m){
  const box=minimap.getBoundingClientRect(), pad=12;
  mmScale=Math.min((box.width-pad*2)/contentW,(box.height-pad*2)/contentH);
  mmOffX=(box.width-contentW*mmScale)/2; mmOffY=(box.height-contentH*mmScale)/2;
  mmInner.innerHTML='';
  areaEls.forEach((el,i)=>{
    const d=document.createElement('div'); d.className='mm-area';
    d.style.left=(mmOffX+el.offsetLeft*mmScale)+'px';
    d.style.top=(mmOffY+el.offsetTop*mmScale)+'px';
    d.style.width=(el.offsetWidth*mmScale)+'px';
    d.style.height=(el.offsetHeight*mmScale)+'px';
    d.style.background=AREA_FILL[i]||'rgba(0,0,0,.15)';
    d.style.border='1px solid rgba(16,52,76,.25)';
    mmInner.appendChild(d);
  });
  mmView=document.createElement('div'); mmView.className='mm-view'; mmInner.appendChild(mmView);
}
function updateMiniView(){
  if(!mmView)return;
  const r=vp.getBoundingClientRect();
  const visX=-tx/scale, visY=-ty/scale, visW=r.width/scale, visH=r.height/scale;
  mmView.style.left=(mmOffX+visX*mmScale)+'px';
  mmView.style.top=(mmOffY+visY*mmScale)+'px';
  mmView.style.width=(visW*mmScale)+'px';
  mmView.style.height=(visH*mmScale)+'px';
}
minimap.addEventListener('click',e=>{
  const box=minimap.getBoundingClientRect();
  const wx=(e.clientX-box.left-mmOffX)/mmScale, wy=(e.clientY-box.top-mmOffY)/mmScale;
  const r=vp.getBoundingClientRect();
  tx=r.width/2-wx*scale; ty=r.height/2-wy*scale; apply(true);
});

/* ---------- connectors (SVG, computed from real card positions) ---------- */
function drawTreeConnectors(){
  document.querySelectorAll('.conn-svg').forEach(s=>s.remove());
  const prevT = world.style.transform;
  world.style.transform = 'none';                 // measure at scale 1
  const NS='http://www.w3.org/2000/svg';
  document.querySelectorAll('.area .tree').forEach(tree=>{
    const tr = tree.getBoundingClientRect();
    const rel = el=>{const r=el.getBoundingClientRect();return{cx:r.left+r.width/2-tr.left, top:r.top-tr.top, bottom:r.bottom-tr.top};};
    const svg = document.createElementNS(NS,'svg');
    svg.setAttribute('class','conn-svg');
    svg.setAttribute('width', tree.scrollWidth);
    svg.setAttribute('height', tree.scrollHeight);
    tree.querySelectorAll('li').forEach(li=>{
      const pc = li.querySelector(':scope > .node > .card'); if(!pc) return;
      const kids = [...li.querySelectorAll(':scope > ul > li > .node > .card')]; if(!kids.length) return;
      const p = rel(pc), k = kids.map(rel);
      const childTop = Math.min(...k.map(x=>x.top));
      const busY = p.bottom + (childTop - p.bottom)/2;     // elbow midline
      const minX = Math.min(...k.map(x=>x.cx)), maxX = Math.max(...k.map(x=>x.cx));
      let d = `M ${p.cx} ${p.bottom} V ${busY} M ${minX} ${busY} H ${maxX} `;
      k.forEach(x=>{ d += `M ${x.cx} ${busY} V ${x.top} `; });
      const path = document.createElementNS(NS,'path');
      path.setAttribute('d', d);
      path.setAttribute('fill','none');
      path.setAttribute('stroke','#AAB1B9');
      path.setAttribute('stroke-width','2');
      path.setAttribute('stroke-linecap','round');
      svg.appendChild(path);
    });
    tree.insertBefore(svg, tree.firstChild);
  });
  world.style.transform = prevT;
}

/* ---------- init ---------- */
function init(){ layout(); drawTreeConnectors(); fitView(false); }
window.addEventListener('load', init);
if(document.fonts && document.fonts.ready){ document.fonts.ready.then(init); }
window.addEventListener('resize', ()=>{ layout(); drawTreeConnectors(); updateMiniView(); });
init();
</script>
</body>
